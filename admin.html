<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0c10;
  color:white;
  padding:20px;
}

/* HEADER */
h2{
  margin-bottom:15px;
  font-size:22px;
}

/* INPUT AREA */
.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1c22;
  color:white;
  outline:none;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* MAIN BUTTON */
.load{
  background:#00ffcc;
  color:black;
}

/* CARD */
.card{
  background:#151821;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:15px;
  margin-top:15px;
}

/* PRODUCT HEADER */
.productHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.title{
  font-size:18px;
  font-weight:600;
}

.price{
  color:#00ffcc;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:13px;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  text-align:center;
  color:#ddd;
}

th{
  color:#00ffcc;
}

/* ACTION BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.danger{
  background:#ff3b3b;
  color:white;
}

.secondary{
  background:#2a2d3a;
  color:white;
}

.empty{
  opacity:0.6;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>

<div class="top">
  <input id="productId" placeholder="Enter product ID">
  <button class="load" onclick="load()">Load</button>
</div>

<div id="content"></div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

async function load(){

  const id = document.getElementById("productId").value.trim();
  if(!id) return alert("Enter ID");

  const res1 = await fetch(API + "?id=" + id);
  const product = await res1.json();

  if(product.error){
    document.getElementById("content").innerHTML =
      `<div class="card">Product not found</div>`;
    return;
  }

  const res2 = await fetch(API + "?sub=" + id);
  let subs = await res2.json();
  subs = subs || [];

  let html = `
  <div class="card">

    <div class="productHeader">
      <div class="title">${product.name}</div>
      <div class="price">${product.price || ""}</div>
    </div>

    <div class="actions">
      <button class="danger" onclick="deleteProduct('${id}')">Delete Product</button>
    </div>

    <table>
      <tr>
        ${product.fields.map(f => `<th>${f}</th>`).join("")}
        <th>Action</th>
      </tr>
  `;

  if(subs.length === 0){
    html += `<tr><td colspan="100%" class="empty">No submissions yet</td></tr>`;
  } else {

    subs.forEach((row, index)=>{
      html += `
      <tr>
        ${row.map(v=>`<td>${v}</td>`).join("")}
        <td>
          <button class="danger" onclick="deleteSub('${id}',${index})">X</button>
        </td>
      </tr>
      `;
    });
  }

  html += `</table></div>`;

  document.getElementById("content").innerHTML = html;
}

/* DELETE PRODUCT */
async function deleteProduct(id){
  if(!confirm("Delete this product?")) return;

  await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      deleteProduct:id
    })
  });

  document.getElementById("content").innerHTML = "";
  alert("Deleted");
}

/* DELETE SUBMISSION */
async function deleteSub(id, index){

  await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      deleteSub:true,
      id,
      index
    })
  });

  load();
}

</script>

</body>
</html>
