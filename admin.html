<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f7fb;
  color:#222;
  padding:20px;
}

/* HEADER */
.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:220px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
}

.load{ background:#4CAF50; color:white; }
.del{ background:#ff4d4d; color:white; }

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

th{
  background:#4CAF50;
  color:white;
  padding:12px;
  font-weight:600;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

tr:hover{
  background:#f1f5ff;
}

.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<div class="top">
  <input id="productId" placeholder="Product ID">
  <button class="load" onclick="load()">Load</button>
</div>

<div id="actions"></div>
<div id="table"></div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

async function load(){

  const id = document.getElementById("productId").value.trim();
  if(!id) return alert("Enter ID");

  const product = await fetch(API + "?id=" + id).then(r=>r.json());

  if(product.error){
    document.getElementById("table").innerHTML = "Product not found";
    return;
  }

  let subs = await fetch(API + "?sub=" + id).then(r=>r.json());
  subs = subs || [];

  // ACTION BUTTONS
  document.getElementById("actions").innerHTML = `
    <div class="actions">
      <button class="del" onclick="deleteProduct('${id}')">Delete Product</button>
    </div>
  `;

  // TABLE
  let html = `<table><tr>`;

  product.fields.forEach(f=>{
    html += `<th>${f}</th>`;
  });

  html += `<th>Delete</th></tr>`;

  subs.forEach((row,i)=>{
    html += `<tr>`;
    row.forEach(v=>{
      html += `<td>${v}</td>`;
    });
    html += `<td><button class="del" onclick="deleteSub('${id}',${i})">X</button></td></tr>`;
  });

  html += `</table>`;

  document.getElementById("table").innerHTML = html;
}

/* DELETE PRODUCT */
async function deleteProduct(id){
  if(!confirm("Delete product?")) return;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({ deleteProduct:id })
  });

  location.reload();
}

/* DELETE SUB */
async function deleteSub(id,i){

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      deleteSub:true,
      id,
      index:i
    })
  });

  load();
}

</script>

</body>
</html>
