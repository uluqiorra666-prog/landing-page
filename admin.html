<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;padding:20px}
.card{background:#1c1c1c;padding:15px;margin-bottom:10px;border-radius:10px}
button{margin:5px;padding:6px;border:none;border-radius:6px;cursor:pointer}
.view{background:#00ffcc}
.del{background:red;color:white}
</style>
</head>

<body>

<h2>Products</h2>
<div id="list"></div>

<h2>Details</h2>
<div id="details"></div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev/";

async function load(){
  const res = await fetch(API + "?all=1");
  const data = await res.json();

  let html = "";

  data.forEach(p=>{
    html += `
      <div class="card">
        <b>${p.name}</b><br>
        <button class="view" onclick="openP('${p.id}')">View</button>
        <button class="del" onclick="delP('${p.id}')">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function openP(id){

  const p = await fetch(API + "?id="+id).then(r=>r.json());
  const s = await fetch(API + "?sub="+id).then(r=>r.json());

  let html = `
    <div class="card">
    <h3>${p.name}</h3>
    <p>${p.price}</p>
    <table border="1" width="100%">
    <tr>${p.fields.map(f=>`<th>${f}</th>`).join("")}</tr>
  `;

  s.forEach(r=>{
    html += `<tr>${r.map(v=>`<td>${v}</td>`).join("")}</tr>`;
  });

  html += "</table></div>";

  document.getElementById("details").innerHTML = html;
}

async function delP(id){
  if(!confirm("Delete?")) return;

  await fetch(API + "?id="+id,{method:"DELETE"});
  load();
  document.getElementById("details").innerHTML="";
}

load();

</script>

</body>
</html>
