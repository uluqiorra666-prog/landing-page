<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0f1a;
  color:white;
  padding:20px;
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* PRODUCT BLOCK */
.block{
  margin-bottom:30px;
}

/* PRODUCT HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.name{
  font-size:16px;
  font-weight:600;
}

.price{
  color:#00ffcc;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:#00ffcc;
  color:black;
  padding:10px;
}

td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  text-align:center;
}

tr:hover{
  background:#1f2937;
}

/* BUTTONS */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.del{
  background:#ff4d4d;
  color:white;
}
</style>
</head>

<body>

<h2>All Products</h2>

<div id="content"></div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

async function loadAll(){

  const list = await fetch(API + "?all=1").then(r=>r.json());

  let html = "";

  for(const p of list){

    const product = await fetch(API + "?id=" + p.id).then(r=>r.json());
    let subs = await fetch(API + "?sub=" + p.id).then(r=>r.json());
    subs = subs || [];

    html += `
    <div class="block">

      <div class="header">
        <div class="name">${product.name}</div>
        <div class="price">${product.price || ""}</div>
      </div>

      <table>
        <tr>
          ${product.fields.map(f=>`<th>${f}</th>`).join("")}
          <th>Delete</th>
        </tr>
    `;

    if(subs.length === 0){
      html += `<tr><td colspan="100%">No submissions</td></tr>`;
    }

    subs.forEach((row,i)=>{
      html += `<tr>
        ${row.map(v=>`<td>${v}</td>`).join("")}
        <td><button class="btn del" onclick="deleteSub('${p.id}',${i})">X</button></td>
      </tr>`;
    });

    html += `</table></div>`;
  }

  document.getElementById("content").innerHTML = html;
}

/* DELETE SUB */
async function deleteSub(id,i){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      deleteSub:true,
      id,
      index:i
    })
  });

  loadAll();
}

loadAll();

</script>

</body>
</html>
