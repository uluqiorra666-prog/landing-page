<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.del{ background:red; color:white; }
.view{ background:#00ffcc; }
</style>
</head>

<body>

<h2>All Products</h2>
<div id="list"></div>

<div id="details"></div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

async function loadProducts(){
  const res = await fetch(API + "?all=1");
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <div class="card">
        <b>${p.name}</b>
        <br>
        <button class="view" onclick="openProduct('${p.id}')">View</button>
        <button class="del" onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function openProduct(id){

  const p = await fetch(API + "?id=" + id).then(r=>r.json());
  const subs = await fetch(API + "?sub=" + id).then(r=>r.json());

  let html = `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.price}</p>
      <h4>Submissions</h4>
      <table border="1" width="100%">
        <tr>${p.fields.map(f=>`<th>${f}</th>`).join("")}</tr>
  `;

  subs.forEach(s=>{
    html += `<tr>${s.map(v=>`<td>${v}</td>`).join("")}</tr>`;
  });

  html += "</table></div>";

  document.getElementById("details").innerHTML = html;
}

async function deleteProduct(id){
  await fetch(API + "?id=" + id, { method:"DELETE" });
  loadProducts();
}

loadProducts();

</script>

</body>
</html>
