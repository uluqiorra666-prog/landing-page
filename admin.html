<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  padding:15px;
}

h2{
  margin:10px 0;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.name{
  font-weight:bold;
  font-size:16px;
}

.actions{
  margin-top:10px;
}

button{
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.view{ background:#00ffcc; }
.del{ background:#ff4444; color:white; }

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

th,td{
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  text-align:center;
}

th{
  color:#00ffcc;
}

@media(min-width:700px){
  .grid{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<h2>Products</h2>
<div id="list" class="grid"></div>

<h2>Details</h2>
<div id="details"></div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

async function load(){
  const res = await fetch(API + "?all=1");
  const data = await res.json();

  let html = "";

  data.forEach(p=>{
    html += `
      <div class="card">
        <div class="name">${p.name}</div>
        <div class="actions">
          <button class="view" onclick="openP('${p.id}')">View</button>
          <button class="del" onclick="delP('${p.id}')">Delete</button>
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function openP(id){

  const p = await fetch(API + "?id="+id).then(r=>r.json());
  const s = await fetch(API + "?sub="+id).then(r=>r.json());

  let html = `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.price}</p>
      <table>
        <tr>${p.fields.map(f=>`<th>${f}</th>`).join("")}</tr>
  `;

  s.forEach(r=>{
    html += `<tr>${r.map(v=>`<td>${v}</td>`).join("")}</tr>`;
  });

  html += "</table></div>";

  document.getElementById("details").innerHTML = html;
}

async function delP(id){
  if(!confirm("Delete product + submissions?")) return;

  await fetch(API + "?id="+id,{method:"DELETE"});
  load();
  document.getElementById("details").innerHTML="";
}

load();

</script>

</body>
</html>
