<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.box{
  width:420px;
  padding:25px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:15px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

/* BUTTON COLORS */
.add{ background:#00ffaa; }
.create{ background:#ffffff; color:black; }
.copy{ background:#ffd700; color:black; }

.del{
  background:red;
  color:white;
  width:40px;
}

/* FIELD ROW */
.fieldBox{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.fieldBox input{
  flex:1;
}

/* LINK */
#link{
  margin-top:10px;
  font-size:12px;
  word-break:break-all;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="box">

<h2>Create Product</h2>

<input id="name" placeholder="Product name">

<!-- NEW PRICE INPUT -->
<input id="price" placeholder="Price (ex: 2500 DA)">

<div id="fields"></div>

<button class="add" onclick="addField()">+ Add Field</button>

<button class="create" onclick="create()">Create</button>

<p id="link"></p>

<button class="copy" onclick="copyLink()">Copy Link</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyVu00PQ3YIfPWeWCAERPAcCoieRUorqv9KuVcvcal5TxEkKZzQOsFUJLOpL5E4Q_axLA/exec";
const SITE = "https://uluqiorra666-prog.github.io/landing-page/";

let fields = [];
let lastLink = "";
let creating = false;

/* ADD FIELD */
function addField(){
  const index = fields.length;
  fields.push(index);

  const div = document.createElement("div");
  div.className = "fieldBox";
  div.id = "box"+index;

  div.innerHTML = `
    <input id="f${index}" placeholder="Field name">
    <button class="del" onclick="removeField(${index})">X</button>
  `;

  document.getElementById("fields").appendChild(div);
}

/* REMOVE FIELD */
function removeField(i){
  document.getElementById("box"+i).remove();
  fields[i] = null;
}

/* CREATE PRODUCT */
function create(){

  if(creating) return;
  creating = true;

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();

  let finalFields = []; // price always first

  for(let i=0;i<fields.length;i++){
    const el = document.getElementById("f"+i);
    if(el && el.value.trim() !== ""){
      finalFields.push(el.value.trim());
    }
  }

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      name:name,
      fields: finalFields
    })
  })
  .then(r=>r.json())
  .then(data=>{

    lastLink = SITE + "/?id=" + data.id;

    document.getElementById("link").innerText = lastLink;

    // STORE PRICE LOCALLY FOR LP USE
    localStorage.setItem("price_"+data.id, price);

    creating = false;
  })
  .catch(()=>{
    creating = false;
  });
}

/* COPY LINK */
function copyLink(){
  if(!lastLink) return alert("No link yet");
  navigator.clipboard.writeText(lastLink);
  alert("Copied!");
}

</script>

</body>
</html>
