<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:420px;
  padding:25px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

.add{ background:#00ffaa; }
.create{ background:#ffffff; color:black; }
.copy{ background:#ffd700; color:black; }

.del{
  background:red;
  color:white;
  width:40px;
}

.fieldBox{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.fieldBox input{
  flex:1;
}

#link{
  margin-top:10px;
  font-size:12px;
  word-break:break-all;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="box">

<h2>Create Product</h2>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price (ex: 2500 DA)">

<div id="fields"></div>

<button class="add" onclick="addField()">+ Add Field</button>
<button class="create" onclick="create()">Create</button>

<p id="link"></p>

<button class="copy" onclick="copyLink()">Copy Link</button>

</div>

<script>

const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";
const SITE = "https://uluqiorra666-prog.github.io/landing-page";

let lastLink = "";
let creating = false;

/* ADD FIELD */
function addField(){
  const container = document.getElementById("fields");

  const div = document.createElement("div");
  div.className = "fieldBox";

  div.innerHTML = `
    <input placeholder="Field name">
    <button class="del" onclick="this.parentElement.remove()">X</button>
  `;

  container.appendChild(div);
}

/* CREATE PRODUCT */
function create(){

  if(creating) return;
  creating = true;

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();

  let finalFields = [];

  const inputs = document.querySelectorAll("#fields input");

  inputs.forEach(input => {
    const val = input.value.trim();
    if(val !== "" && val.toLowerCase() !== "price"){
      finalFields.push(val);
    }
  });

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      name,
      price,
      fields: finalFields
    })
  })
  .then(r => r.json())
  .then(data => {

    lastLink = SITE + "/index.html?id=" + data.id;

    document.getElementById("link").innerText = lastLink;

    creating = false;
  })
  .catch(() => {
    document.getElementById("link").innerText = "Error ❌";
    creating = false;
  });
}

/* COPY LINK */
function copyLink(){
  if(!lastLink) return alert("No link yet");
  navigator.clipboard.writeText(lastLink);
  alert("Copied!");
}

</script>

</body>
</html>
