<!DOCTYPE html>
<html>
<head> 
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Landing Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  min-height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Inter', sans-serif;
  color:white;
  padding:15px;
  overflow:hidden;
}

/* ===== PREMIUM BACKGROUND ===== */
.wave{
  position:absolute;
  width:300%;
  height:300%;
  top:-100%;
  right:-100%;
  filter: blur(65px);
  opacity:1;
  z-index:0;
}

/* CARD FLOAT EFFECT */
.card{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  padding:22px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  animation: float 6s ease-in-out infinite;
}

/* soft float */
@keyframes float{
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-6px); }
}

h2{
  text-align:center;
  margin-bottom:12px;
  font-size:18px;
  position:relative;
}

/* glow line under title */
h2::after{
  content:"";
  display:block;
  width:60px;
  height:2px;
  background:#00ffcc;
  margin:8px auto 0;
  border-radius:10px;
  opacity:0.7;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
  font-size:14px;
  transition:0.2s;
}

input:focus{
  outline:2px solid #00ffcc;
  background:rgba(255,255,255,0.16);
  transform:scale(1.01);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ffcc,#00d4ff);
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(0,255,204,0.3);
}

/* STATUS */
#status{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  opacity:0.8;
}

/* MOBILE OPTIMIZED */
@media(max-width:600px){
  .card{
    padding:18px;
  }

  h2{
    font-size:17px;
  }
}
</style>
</head>

<body>

<div class="wave" id="wave"></div>

<div class="card">
  <h2 id="title">Loading...</h2>
  <div id="form"></div>
  <button id="submitBtn">Submit</button>
  <div id="status"></div>
</div>

<script>

/* ===== SMOOTH BACKGROUND (FIXED & STRONG) ===== */
const wave = document.getElementById("wave");
let t = 0;

function animate(){

  t += 0.0035;

  const r1 = Math.floor(40 + 215*Math.sin(t));
  const g1 = Math.floor(40 + 215*Math.sin(t*1.2));
  const b1 = 255;

  const r2 = 255;
  const g2 = Math.floor(40 + 215*Math.sin(t*1.1));
  const b2 = Math.floor(40 + 215*Math.sin(t*0.9));

  const r3 = Math.floor(40 + 215*Math.sin(t*0.8));
  const g3 = 255;
  const b3 = Math.floor(40 + 215*Math.sin(t*1.4));

  wave.style.background = `
    radial-gradient(circle at 30% 30%, rgba(${r1},${g1},${b1},0.38), transparent 45%),
    radial-gradient(circle at 70% 60%, rgba(${r2},${g2},${b2},0.38), transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(${r3},${g3},${b3},0.38), transparent 45%)
  `;

  requestAnimationFrame(animate);
}

animate();

/* ===== BACKEND ===== */
const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

const id = new URLSearchParams(window.location.search).get("id");

let fields = [];

if(!id){
  document.getElementById("title").innerText = "No product ID";
}

/* LOAD PRODUCT */
fetch(API + "?id=" + id)
.then(r => r.json())
.then(data => {

  if(data.error){
    document.getElementById("title").innerText = "Product not found";
    return;
  }

  document.getElementById("title").innerHTML =
    data.name +
    `<br><span style="color:#00ffcc;font-size:15px">${data.price || ""}</span>`;

  fields = data.fields;

  let html = "";

  fields.forEach((f,i)=>{
    html += `<input id="f${i}" placeholder="${f}">`;
  });

  document.getElementById("form").innerHTML = html;
});

/* SEND DATA */
let sending = false;

function send(){

  if(sending) return;
  sending = true;

  let values = [];

  fields.forEach((f,i)=>{
    const val = document.getElementById("f"+i).value;
    values.push(val);
  });

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      id:id,
      values:values
    })
  })
  .then(r=>r.json())
  .then(()=>{
    document.getElementById("status").innerText = "Sent ✔";
    sending = false;
  })
  .catch(()=>{
    document.getElementById("status").innerText = "Error ❌";
    sending = false;
  });
}

document.getElementById("submitBtn").addEventListener("click", send);

</script>

</body>
</html>
