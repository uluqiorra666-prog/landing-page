<!DOCTYPE html>
<html>
<head> 
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Landing Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  min-height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Inter', sans-serif;
  color:white;
  overflow:hidden;
}

/* BACKGROUND (CONTROLLED GLOW) */
.wave{
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  filter: blur(90px);
  opacity:0.9;
  z-index:0;
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:16px;
  background:#0b0f1a;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 0 50px rgba(0,0,0,0.8);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:15px;
  font-size:18px;
}

/* FORM CENTERING */
#form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* INPUT */
input{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
  text-align:center;
  font-size:14px;
}

input:focus{
  outline:2px solid #00ffcc;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ffcc,#00aaff);
  font-weight:bold;
  cursor:pointer;
}

/* STATUS */
#status{
  margin-top:10px;
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="wave" id="wave"></div>

<div class="card">
  <h2 id="title">Loading...</h2>
  <div id="form"></div>
  <button id="submitBtn">Submit</button>
  <div id="status"></div>
</div>

<script>

/* SMOOTH CONTROLLED COLOR */
const wave = document.getElementById("wave");
let t = 0;

function animate(){

  t += 0.002;

  const r = Math.floor(50 + 100*Math.sin(t));
  const g = Math.floor(100 + 100*Math.sin(t*1.2));
  const b = 255;

  const r2 = 255;
  const g2 = Math.floor(80 + 100*Math.sin(t*0.9));
  const b2 = Math.floor(150 + 100*Math.sin(t*1.3));

  wave.style.background = `
    radial-gradient(circle at 30% 40%, rgba(${r},${g},${b},0.35), transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(${r2},${g2},${b2},0.35), transparent 50%)
  `;

  requestAnimationFrame(animate);
}

animate();

/* BACKEND */
const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";
const id = new URLSearchParams(window.location.search).get("id");

let fields = [];

fetch(API + "?id=" + id)
.then(r => r.json())
.then(data => {

  if(data.error){
    document.getElementById("title").innerText = "Product not found";
    return;
  }

  document.getElementById("title").innerHTML =
    data.name +
    `<br><span style="color:#00ffcc">${data.price || ""}</span>`;

  fields = data.fields;

  let html = "";

  fields.forEach((f,i)=>{
    html += `<input id="f${i}" placeholder="${f}">`;
  });

  document.getElementById("form").innerHTML = html;
});

/* SEND */
function send(){

  let values = [];

  fields.forEach((f,i)=>{
    values.push(document.getElementById("f"+i).value);
  });

  fetch(API,{
    method:"POST",
    body: JSON.stringify({ id, values })
  })
  .then(()=> document.getElementById("status").innerText = "Sent ✔")
  .catch(()=> document.getElementById("status").innerText = "Error ❌");
}

document.getElementById("submitBtn").addEventListener("click", send);

</script>

</body>
</html>
