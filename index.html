<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<title>Landing Page</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  color:white;
}

.wave{
  position:absolute;
  width:300%;
  height:300%;
  top:-100%;
  right:-100%;
  filter: blur(50px);
  animation: move linear infinite;
}

@keyframes move{
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%,-25%); }
  100% { transform: translate(0,0); }
}

.card{
  position:relative;
  z-index:2;
  width:320px;
  padding:20px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
}

h2{
  text-align:center;
  margin-bottom:10px;
}

input{
  width:85%;
  padding:10px;
  margin:6px auto;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  display:block;
  text-align:center;
}
input:focus{
  outline:2px solid #00ffcc;
  background:rgba(255,255,255,0.15);
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}

#status{
  text-align:center;
  margin-top:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="wave" id="wave"></div>

<div class="card">
  <h2 id="title">Loading...</h2>
  <div id="form"></div>
  <button id="submitBtn">Submit</button>
  <div id="status"></div>
</div>

<script>

/* ===== BACKGROUND ===== */
const wave = document.getElementById("wave");
wave.style.animationDuration = (6 + Math.random()*10) + "s";

function randomBg(){
  const c1 = `rgba(${Math.random()*255},${Math.random()*255},255,0.25)`;
  const c2 = `rgba(255,${Math.random()*255},${Math.random()*255},0.25)`;
  const c3 = `rgba(${Math.random()*255},255,${Math.random()*255},0.25)`;

  wave.style.background = `
    radial-gradient(circle at 30% 30%, ${c1}, transparent 40%),
    radial-gradient(circle at 70% 60%, ${c2}, transparent 40%),
    radial-gradient(circle at 40% 80%, ${c3}, transparent 40%)
  `;
}
randomBg();
setInterval(randomBg, 4000);

/* ===== BACKEND ===== */
const API = "https://affirilha-backend-8fdf.uluqiorra666.workers.dev";

const id = new URLSearchParams(window.location.search).get("id");

let fields = [];

if(!id){
  document.getElementById("title").innerText = "No product ID";
}

/* LOAD PRODUCT */
fetch(API + "?id=" + id)
.then(r => r.json())
.then(data => {

  if(data.error){
    document.getElementById("title").innerText = "Product not found";
    return;
  }

  // TITLE + PRICE
  document.getElementById("title").innerHTML =
    data.name +
    `<br><span style="color:#00ffcc;font-size:18px">${data.price || ""}</span>`;

  // FIELDS
  fields = data.fields;

  let html = "";

  fields.forEach((f,i)=>{
    html += `<input id="f${i}" placeholder="${f}">`;
  });

  document.getElementById("form").innerHTML = html;
});

/* SEND DATA */
let sending = false;

function send(){

  if(sending) return;
  sending = true;

  let values = [];

  fields.forEach((f,i)=>{
    const val = document.getElementById("f"+i).value;
    values.push(val);
  });

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      id:id,
      values:values
    })
  })
  .then(r=>r.json())
  .then(()=>{
    document.getElementById("status").innerText = "Sent ✔";
    sending = false;
  })
  .catch(()=>{
    document.getElementById("status").innerText = "Error ❌";
    sending = false;
  });
}

/* BUTTON */
document.getElementById("submitBtn").addEventListener("click", send);

</script>

</body>
</html>
